<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Tombol Link</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        .btn{
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            text-decoration: none;
            color: white;
            background-color: #4CAF50;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover{
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <a href="https://example1.com" class="btn" target="_blank">Tombol 1</a>

    <a href="https://example2.com" class="btn" target="_blank">Tombol 2</a>

    <a href="https://example3.com" class="btn" target="_blank">Tombol 3</a>

</body>
</html>
