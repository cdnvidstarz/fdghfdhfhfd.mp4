<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Tombol Link Vertikal</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f4f4;
        }

        .container{
            display: flex;
            flex-direction: column; /* Membuat tombol tersusun ke bawah */
            gap: 15px;
        }

        .btn{
            text-decoration: none;
            padding: 15px 30px;
            background: #4CAF50;
            color: white;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover{
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://link1.com" class="btn" target="_blank">🔗 Tombol Link 1</a>
        <a href="https://link2.com" class="btn" target="_blank">🔗 Tombol Link 2</a>
        <a href="https://link3.com" class="btn" target="_blank">🔗 Tombol Link 3</a>
    </div>

</body>
</html>
