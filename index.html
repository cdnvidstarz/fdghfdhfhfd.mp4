<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Tombol Link Vertikal</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f5f5f5;
        font-family:Arial, sans-serif;
    }

    .menu{
        display:flex;
        flex-direction:column;
        gap:15px;
        width:250px;
    }

    .btn{
        text-decoration:none;
        color:white;
        padding:15px;
        border-radius:15px;
        text-align:center;
        font-size:18px;
        font-weight:bold;
        transition:0.3s;
    }

    /* Tombol 1 */
    .btn1{
        background:linear-gradient(45deg,#ff6b6b,#ff8e53);
    }

    .btn1:hover{
        transform:translateX(10px);
    }

    /* Tombol 2 */
    .btn2{
        background:linear-gradient(45deg,#36d1dc,#5b86e5);
    }

    .btn2:hover{
        transform:scale(1.05);
    }

    /* Tombol 3 */
    .btn3{
        background:linear-gradient(45deg,#11998e,#38ef7d);
    }

    .btn3:hover{
        transform:translateY(-5px);
        box-shadow:0 10px 20px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<div class="menu">
    <a href="https://link1.com" class="btn btn1" target="_blank">
        🚀 Website Utama
    </a>

    <a href="https://link2.com" class="btn btn2" target="_blank">
        📷 Instagram
    </a>

    <a href="https://link3.com" class="btn btn3" target="_blank">
        🎬 YouTube
    </a>
</div>

</body>
</html>
